<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Escape Gettysburg</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="styles.css">
  
  <style>
    .clock-glow {
      text-shadow: 
        0 0 20px rgba(0, 160, 226, 0.8),
        0 0 40px rgba(0, 160, 226, 0.6),
        0 0 60px rgba(0, 160, 226, 0.4),
        0 0 80px rgba(0, 160, 226, 0.2);
      animation: pulse-glow 2s ease-in-out infinite;
    }
    
    @keyframes pulse-glow {
      0%, 100% { 
        text-shadow: 
          0 0 20px rgba(0, 160, 226, 0.8),
          0 0 40px rgba(0, 160, 226, 0.6),
          0 0 60px rgba(0, 160, 226, 0.4),
          0 0 80px rgba(0, 160, 226, 0.2);
      }
      50% { 
        text-shadow: 
          0 0 30px rgba(0, 160, 226, 1),
          0 0 60px rgba(0, 160, 226, 0.8),
          0 0 90px rgba(0, 160, 226, 0.5),
          0 0 120px rgba(0, 160, 226, 0.3);
      }
    }
    
    .colon-blink {
      animation: blink 1s step-end infinite;
    }
    
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body style="background: #0A0A0B;" class="min-h-screen flex flex-col">
  
  <!-- Logo -->
  <header class="pt-8 pb-4 px-6">
    <div class="max-w-7xl mx-auto">
      <a href="/" class="inline-block">
        <img src="/images/title_logo.png" alt="Escape Gettysburg" class="h-14 md:h-16 w-auto">
      </a>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-grow flex items-center justify-center px-6">
    <div class="text-center">
      
      <!-- Glowing Clock -->
      <div class="mb-6">
        <span class="font-display text-[10rem] md:text-[14rem] tracking-wider text-brand-blue clock-glow">
          4<span class="colon-blink">:</span>04
        </span>
      </div>
      
      <!-- Error Message -->
      <h1 class="font-display text-3xl md:text-4xl tracking-wider text-white mb-3">
        PAGE NOT FOUND
      </h1>
      
      <!-- Simple Message -->
      <p class="font-body text-xl text-slate-400 mb-10">
        Sorry, we couldn't find what you're looking for.
      </p>
      
      <!-- Single Button -->
      <a href="/" class="inline-block px-10 py-4 rounded-xl font-display text-2xl tracking-wide transition-all hover:scale-105 text-white"
         style="background: linear-gradient(90deg, #3684bf, #00a0e2); box-shadow: 0 0 30px rgba(0,160,226,0.4);">
        BACK TO HOME
      </a>
      
    </div>
  </main>

</body>
</html>
